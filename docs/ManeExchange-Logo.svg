<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Origami fold gradient for the horse silhouette -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4B65E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="foldShadow" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#8A8070;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="paperLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5F2EC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EDE9E0;stop-opacity:1" />
    </linearGradient>
    <!-- Subtle crease texture -->
    <filter id="paperTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#F5F2EC" surfaceScale="1.5" result="light">
        <feDistantLight azimuth="45" elevation="55"/>
      </feDiffuseLighting>
      <feComposite in="SourceGraphic" in2="light" operator="arithmetic" k1="0.8" k2="0.3" k3="0" k4="0"/>
    </filter>
    <!-- Elegant shadow -->
    <filter id="elegantShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(60,50,35,0.12)"/>
    </filter>
    <filter id="liftedShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(60,50,35,0.10)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#FAFAF8"/>

  <!-- Subtle diagonal crease line (origami reference) -->
  <line x1="0" y1="400" x2="200" y2="200" stroke="#E5DFD3" stroke-width="0.5" opacity="0.4"/>
  <line x1="600" y1="0" x2="800" y2="200" stroke="#E5DFD3" stroke-width="0.5" opacity="0.4"/>

  <!-- Origami-style geometric horse head - elegant, abstract, folded paper feel -->
  <g transform="translate(160, 68)" filter="url(#elegantShadow)">
    <!-- Main horse head shape - geometric/origami style -->
    <!-- Neck and jaw base -->
    <polygon points="80,260 120,140 160,100 180,120 170,180 140,240 100,270"
             fill="#C9A84C" opacity="0.95"/>
    <!-- Head upper portion -->
    <polygon points="120,140 160,100 200,60 210,40 195,30 170,50 140,90"
             fill="#D4B65E" opacity="0.95"/>
    <!-- Ear - sharp origami triangle -->
    <polygon points="195,30 210,40 215,10 205,5"
             fill="#C9A84C"/>
    <!-- Second ear -->
    <polygon points="170,50 195,30 185,15 168,35"
             fill="#B8972F" opacity="0.8"/>
    <!-- Forehead fold crease -->
    <line x1="160" y1="100" x2="195" y2="30" stroke="#B8972F" stroke-width="1.2" opacity="0.5"/>
    <!-- Cheek fold -->
    <polygon points="160,100 180,120 200,100 210,40 200,60"
             fill="url(#foldShadow)" opacity="0.6"/>
    <!-- Nose/muzzle detail -->
    <polygon points="120,140 140,90 160,100 145,130"
             fill="#BF9B3A" opacity="0.7"/>
    <!-- Eye - minimal, elegant -->
    <circle cx="185" cy="65" r="4" fill="#2E2D28"/>
    <circle cx="186" cy="64" r="1.5" fill="#F5F2EC" opacity="0.6"/>
    <!-- Mane flowing lines - origami paper strips -->
    <path d="M170,50 C155,70 130,100 115,150 C110,165 108,180 112,200"
          fill="none" stroke="#B8972F" stroke-width="2" opacity="0.6"/>
    <path d="M168,55 C150,80 125,115 110,165 C105,185 105,200 108,220"
          fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.5"/>
    <path d="M165,60 C145,90 118,130 105,180 C100,200 100,215 104,235"
          fill="none" stroke="#D4B65E" stroke-width="1" opacity="0.4"/>
    <!-- Nostril detail -->
    <ellipse cx="128" cy="133" rx="3" ry="4" fill="#8A8070" opacity="0.4"/>
  </g>

  <!-- Typography: "Mane" in elegant serif, "Exchange" in clean sans -->
  <g transform="translate(380, 155)">
    <!-- "Mane" - display weight, Origami style spacing -->
    <text x="0" y="60"
          font-family="Georgia, 'Noto Serif', serif"
          font-size="72"
          font-weight="300"
          letter-spacing="0.08em"
          fill="#1C1B18">Mane</text>
    <!-- "Exchange" - slightly lighter weight, tracked out -->
    <text x="0" y="120"
          font-family="'Helvetica Neue', Helvetica, Inter, sans-serif"
          font-size="42"
          font-weight="300"
          letter-spacing="0.12em"
          fill="#5A5750">EXCHANGE</text>
  </g>

  <!-- Thin gold accent line separating name and tagline -->
  <line x1="385" y1="290" x2="700" y2="290" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>

  <!-- Tagline -->
  <text x="385" y="318"
        font-family="'Helvetica Neue', Helvetica, Inter, sans-serif"
        font-size="11"
        font-weight="400"
        letter-spacing="0.2em"
        fill="#8A8680"
        text-transform="uppercase">THE EQUESTRIAN MARKETPLACE</text>

  <!-- Small corner fold detail (origami motif) -->
  <polygon points="800,0 760,0 800,40" fill="#EDE9E0" opacity="0.5"/>
  <line x1="760" y1="0" x2="800" y2="40" stroke="#D8D3C8" stroke-width="0.5"/>
</svg>